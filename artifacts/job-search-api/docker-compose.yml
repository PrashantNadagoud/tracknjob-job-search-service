version: "3.9"

x-app-env: &app-env
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
  TNJ_JWT_PUBLIC_KEY: ${TNJ_JWT_PUBLIC_KEY}
  TNJ_FRONTEND_URL: ${TNJ_FRONTEND_URL}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ADMIN_USER_ID: ${ADMIN_USER_ID:-}
  PORT: ${PORT:-8000}

services:
  api:
    build: .
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      <<: *app-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  celery-worker:
    build: .
    command: celery -A app.celery_app worker -Q jobs_queue --loglevel=info
    environment:
      <<: *app-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  celery-beat:
    build: .
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_started
    volumes:
      - .:/app

  db:
    image: postgres:14
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

volumes:
  pgdata:
